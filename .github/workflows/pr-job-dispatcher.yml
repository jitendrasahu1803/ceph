#      cancel_only: false
#      cancel_mode: stale

  trigger-poc:
    needs: pr-info
    if: |
      needs.pr-info.outputs.action != 'closed' &&
      needs.pr-info.outputs.skip_ci != 'true' &&
      (
        needs.pr-info.outputs.is_ceph_member == 'true' ||
        github.repository_owner == 'jitendrasahu1803'
      )
    uses: ./.github/workflows/dispatch-jenkins-job.yml
    secrets: inherit
    with:
      pr_number: ${{ needs.pr-info.outputs.pr_number }}
      pr_sha: ${{ needs.pr-info.outputs.pr_sha }}
      jenkins_job: preserve-ceph-pr-trigger-poc
      status_context: jenkins poc test
      trigger_method: PR ${{ needs.pr-info.outputs.action }}
      triggered_by: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      dry_run: false
      post_pending_status: true
      cancel_only: false
      cancel_mode: stale         

  abort-on-close:
    needs: pr-info
    if: needs.pr-info.outputs.action == 'closed'
    uses: ./.github/workflows/dispatch-jenkins-job.yml
    secrets: inherit
    with:
      pr_number: ${{ needs.pr-info.outputs.pr_number }}
      pr_sha: ${{ needs.pr-info.outputs.pr_sha }}
      jenkins_job: preserve-ceph-pr-trigger-poc
      status_context: jenkins poc test
      trigger_method: PR closed
      triggered_by: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      dry_run: false
      post_pending_status: false
      cancel_only: true
      cancel_mode: all
