name: PR Auto Comment POC

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  add-trigger-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Add POC trigger comment to PR
        env:
          GH_TOKEN: ${{ secrets.POC_COMMENT_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail

          # Optional de-duplication: skip if the exact comment already exists
          existing=$(curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
            | jq -r '.[].body')

          if echo "$existing" | grep -Fxq "jenkins test poc"; then
            echo "Trigger comment already exists. Skipping."
            exit 0
          fi

          curl --fail -L \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d '{"body":"jenkins test poc"}'
